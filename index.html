<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ভল্ট — পাসওয়ার্ড ম্যানেজার</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#12151a;
    --surface:#1a1f27;
    --surface2:#20262f;
    --line:#2b323d;
    --brass:#c9a44c;
    --brass-dim:#8a7239;
    --teal:#4fa8a0;
    --danger:#d96b5b;
    --text:#e8e6e1;
    --text-dim:#9aa1ac;
    --mono: 'JetBrains Mono', monospace;
    --disp: 'Space Grotesk', sans-serif;
    --bn: 'Noto Sans Bengali', sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 15% -10%, rgba(201,164,76,0.07), transparent 40%),
      var(--bg);
    color:var(--text);
    font-family:var(--bn);
    min-height:100vh;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:24px 14px 60px;
  }
  .app{width:100%;max-width:560px;}
  .brand{display:flex;align-items:center;gap:12px;margin-bottom:22px;}
  .brand-mark{width:40px;height:40px;flex:none;}
  .brand h1{font-family:var(--disp);font-size:22px;letter-spacing:0.5px;margin:0;color:var(--text);}
  .brand p{margin:0;font-size:12px;color:var(--text-dim);font-family:var(--mono);letter-spacing:0.5px;}

  .card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:14px;
    padding:26px;
    box-shadow:0 20px 40px -20px rgba(0,0,0,0.5);
  }

  /* ---- Lock screen dial ---- */
  .dial-wrap{display:flex;justify-content:center;margin:6px 0 22px;}
  .dial{width:120px;height:120px;position:relative;}
  .dial svg{width:100%;height:100%;transition:transform 0.6s cubic-bezier(.4,1.6,.4,1);}
  .dial.unlocked svg{transform:rotate(35deg);}
  .dial .pin{transition:opacity .4s ease;}
  .dial.unlocked .pin{opacity:0;}

  label{display:block;font-size:12.5px;color:var(--text-dim);margin:14px 0 6px;font-family:var(--mono);}
  input[type=password], input[type=text], input[type=number], select, textarea{
    width:100%;
    background:var(--surface2);
    border:1px solid var(--line);
    color:var(--text);
    padding:11px 12px;
    border-radius:8px;
    font-size:14.5px;
    font-family:var(--bn);
    outline:none;
    transition:border-color .15s ease;
  }
  input[type=password], .mono-field{font-family:var(--mono);letter-spacing:0.5px;}
  input:focus, select:focus, textarea:focus{border-color:var(--brass);}
  textarea{resize:vertical;min-height:70px;}

  button{
    font-family:var(--bn);
    cursor:pointer;
    border:none;
    border-radius:8px;
    font-size:14px;
    transition:filter .15s ease, transform .1s ease;
  }
  button:active{transform:translateY(1px);}
  .btn-primary{
    width:100%;background:var(--brass);color:#1a1508;font-weight:600;
    padding:12px;margin-top:18px;font-size:15px;
  }
  .btn-primary:hover{filter:brightness(1.08);}
  .btn-primary:disabled{opacity:0.4;cursor:not-allowed;}
  .btn-ghost{background:transparent;border:1px solid var(--line);color:var(--text-dim);padding:9px 14px;}
  .btn-ghost:hover{border-color:var(--brass-dim);color:var(--text);}
  .btn-danger{background:transparent;border:1px solid var(--danger);color:var(--danger);padding:9px 14px;}
  .btn-icon{background:var(--surface2);border:1px solid var(--line);color:var(--text-dim);width:34px;height:34px;padding:0;display:inline-flex;align-items:center;justify-content:center;}
  .btn-icon:hover{color:var(--text);border-color:var(--brass-dim);}

  .err{color:var(--danger);font-size:13px;margin-top:10px;font-family:var(--bn);min-height:18px;}
  .hint{color:var(--text-dim);font-size:12px;margin-top:6px;line-height:1.6;}

  .strength{height:4px;border-radius:2px;background:var(--surface2);margin-top:8px;overflow:hidden;}
  .strength-fill{height:100%;transition:width .2s ease, background .2s ease;}

  /* ---- Vault view ---- */
  .toolbar{display:flex;gap:8px;margin-bottom:16px;align-items:center;}
  .toolbar input{flex:1;}
  .chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
  .chip{
    padding:6px 12px;border-radius:20px;font-size:12.5px;
    background:var(--surface2);border:1px solid var(--line);color:var(--text-dim);
    font-family:var(--mono);
  }
  .chip.active{background:rgba(201,164,76,0.15);border-color:var(--brass-dim);color:var(--brass);}

  .entry{
    background:var(--surface2);border:1px solid var(--line);border-radius:10px;
    padding:14px 16px;margin-bottom:10px;
  }
  .entry-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .entry-site{font-weight:600;font-size:15px;}
  .entry-cat{font-size:11px;color:var(--brass);font-family:var(--mono);margin-top:2px;}
  .entry-user{font-family:var(--mono);font-size:13px;color:var(--text-dim);margin-top:6px;word-break:break-all;}
  .entry-pass-row{display:flex;align-items:center;gap:8px;margin-top:6px;}
  .entry-pass{font-family:var(--mono);font-size:13px;letter-spacing:1px;color:var(--text);}
  .entry-actions{display:flex;gap:6px;flex:none;}
  .empty{text-align:center;color:var(--text-dim);padding:50px 10px;font-size:14px;}

  .header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .header-row .btn-ghost{font-size:12.5px;padding:7px 12px;}

  .modal-backdrop{
    position:fixed;inset:0;background:rgba(8,10,13,0.7);
    display:flex;align-items:flex-start;justify-content:center;
    padding:20px 14px;overflow-y:auto;z-index:50;
  }
  .modal{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:22px;width:100%;max-width:480px;margin-top:20px;}
  .modal h3{margin:0 0 4px;font-family:var(--disp);}
  .row2{display:flex;gap:10px;}
  .row2>div{flex:1;}
  .toast{
    position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
    background:var(--surface2);border:1px solid var(--brass-dim);color:var(--text);
    padding:10px 18px;border-radius:20px;font-size:13px;font-family:var(--mono);
    opacity:0;pointer-events:none;transition:opacity .25s ease, transform .25s ease;
    z-index:80;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px);}
  .gen-opts{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;}
  .gen-opts label{display:flex;align-items:center;gap:6px;font-size:12.5px;margin:0;color:var(--text);}
  .gen-opts input[type=checkbox]{width:auto;}
  .footer-link{text-align:center;margin-top:16px;font-size:12px;color:var(--text-dim);cursor:pointer;text-decoration:underline;}
  ::selection{background:rgba(201,164,76,0.3);}
</style>
</head>
<body>
<div class="app">

  <div class="brand">
    <svg class="brand-mark" viewBox="0 0 40 40" fill="none">
      <rect x="4" y="18" width="32" height="18" rx="3" fill="#20262f" stroke="#c9a44c" stroke-width="1.5"/>
      <path d="M12 18v-5a8 8 0 0116 0v5" stroke="#c9a44c" stroke-width="2.2" fill="none"/>
      <circle cx="20" cy="27" r="3" fill="#c9a44c"/>
    </svg>
    <div>
      <h1>ভল্ট</h1>
      <p>AES-256-GCM · লোকাল এনক্রিপ্টেড ভল্ট</p>
    </div>
  </div>

  <div id="root"></div>
</div>

<div id="toast" class="toast"></div>

<script>
/* ============ Crypto helpers ============ */
function bufToB64(buf){
  const bytes = new Uint8Array(buf);
  let bin = '';
  for(let i=0;i<bytes.length;i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin);
}
function b64ToBuf(b64){
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
  return bytes.buffer;
}
function randomB64(len){
  const arr = crypto.getRandomValues(new Uint8Array(len));
  return bufToB64(arr.buffer);
}
async function deriveKey(password, saltB64, iterations){
  const enc = new TextEncoder();
  const salt = new Uint8Array(b64ToBuf(saltB64));
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    {name:'PBKDF2', salt, iterations: iterations || 250000, hash:'SHA-256'},
    keyMaterial,
    {name:'AES-GCM', length:256},
    false,
    ['encrypt','decrypt']
  );
}
async function encryptStr(key, plaintext){
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const enc = new TextEncoder();
  const cipherBuf = await crypto.subtle.encrypt({name:'AES-GCM', iv}, key, enc.encode(plaintext));
  return { iv: bufToB64(iv.buffer), cipher: bufToB64(cipherBuf) };
}
async function decryptStr(key, ivB64, cipherB64){
  const iv = new Uint8Array(b64ToBuf(ivB64));
  const cipherBuf = b64ToBuf(cipherB64);
  const plainBuf = await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, cipherBuf);
  return new TextDecoder().decode(plainBuf);
}
const VERIFIER_TEXT = 'VAULTBD_OK_V1';
const ITERATIONS = 250000;

/* ============ Storage helpers (persistent, personal, local to this browser) ============ */
async function storageGet(key){
  try{
    const v = window.localStorage.getItem(key);
    return (v === null || v === '') ? null : v;
  }catch(e){ return null; }
}
async function storageSet(key, value){
  try{
    window.localStorage.setItem(key, value);
    return true;
  }catch(e){ return null; }
}

/* ============ App State ============ */
const state = {
  screen: 'loading',   // loading | setup | unlock | vault
  key: null,
  entries: [],
  salt: null,
  error: '',
  search: '',
  activeCategory: 'সব',
  modal: null,        // null | {mode:'add'|'edit', entry}
  showGenerator: false,
  lockTimer: null,
};

const CATEGORIES = ['সব','সাধারণ','সোশ্যাল','ব্যাংকিং','ইমেইল','কাজ','অন্যান্য'];

function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(()=> el.classList.remove('show'), 2200);
}

function resetLockTimer(){
  clearTimeout(state.lockTimer);
  state.lockTimer = setTimeout(()=>{
    if(state.screen === 'vault'){
      lockVault();
      toast('নিষ্ক্রিয়তার কারণে ভল্ট লক হয়েছে');
    }
  }, 5*60*1000); // 5 minutes
}
['click','keydown','touchstart'].forEach(evt=>{
  document.addEventListener(evt, ()=>{ if(state.screen==='vault') resetLockTimer(); });
});

function lockVault(){
  state.key = null;
  state.entries = [];
  state.screen = 'unlock';
  render();
}

async function saveVault(){
  const json = JSON.stringify(state.entries);
  const {iv, cipher} = await encryptStr(state.key, json);
  await storageSet('vaultbd-blob', JSON.stringify({iv, cipher}));
}

/* ============ Init ============ */
async function init(){
  const meta = await storageGet('vaultbd-meta');
  state.screen = meta ? 'unlock' : 'setup';
  render();
}

/* ============ Password generator ============ */
function generatePassword(opts){
  const lower = 'abcdefghijkmnpqrstuvwxyz';
  const upper = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
  const nums = '23456789';
  const syms = '!@#$%^&*()-_=+[]{}';
  let pool = '';
  if(opts.lower) pool += lower;
  if(opts.upper) pool += upper;
  if(opts.nums) pool += nums;
  if(opts.syms) pool += syms;
  if(!pool) pool = lower;
  const arr = crypto.getRandomValues(new Uint32Array(opts.length));
  let out = '';
  for(let i=0;i<opts.length;i++) out += pool[arr[i] % pool.length];
  return out;
}
function passwordStrength(pw){
  if(!pw) return {score:0,label:'',color:'#2b323d'};
  let pool = 0;
  if(/[a-z]/.test(pw)) pool += 26;
  if(/[A-Z]/.test(pw)) pool += 26;
  if(/[0-9]/.test(pw)) pool += 10;
  if(/[^a-zA-Z0-9]/.test(pw)) pool += 20;
  const entropy = pw.length * Math.log2(pool || 2);
  if(entropy < 35) return {score:25, label:'দুর্বল', color:'#d96b5b'};
  if(entropy < 55) return {score:55, label:'মোটামুটি', color:'#c9a44c'};
  if(entropy < 75) return {score:80, label:'ভালো', color:'#4fa8a0'};
  return {score:100, label:'শক্তিশালী', color:'#4fa8a0'};
}

/* ============ Render ============ */
function el(tag, attrs={}, children=[]){
  const node = document.createElement(tag);
  for(const [k,v] of Object.entries(attrs)){
    if(k === 'class') node.className = v;
    else if(k.startsWith('on') && typeof v === 'function') node.addEventListener(k.slice(2), v);
    else if(k === 'html') node.innerHTML = v;
    else node.setAttribute(k, v);
  }
  (Array.isArray(children)?children:[children]).forEach(c=>{
    if(c === null || c === undefined) return;
    if(typeof c === 'string') node.appendChild(document.createTextNode(c));
    else node.appendChild(c);
  });
  return node;
}

function dialSVG(unlocked){
  return `<svg viewBox="0 0 120 120">
    <circle cx="60" cy="60" r="52" fill="none" stroke="#2b323d" stroke-width="2"/>
    <circle cx="60" cy="60" r="40" fill="#20262f" stroke="#8a7239" stroke-width="1.5"/>
    ${[0,45,90,135,180,225,270,315].map(a=>{
      const rad = a*Math.PI/180;
      const x1 = 60+46*Math.cos(rad), y1=60+46*Math.sin(rad);
      const x2 = 60+52*Math.cos(rad), y2=60+52*Math.sin(rad);
      return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#c9a44c" stroke-width="2"/>`;
    }).join('')}
    <rect class="pin" x="56" y="14" width="8" height="18" rx="3" fill="${unlocked?'#4fa8a0':'#c9a44c'}"/>
    <circle cx="60" cy="60" r="6" fill="#c9a44c"/>
  </svg>`;
}

function renderSetup(root){
  root.innerHTML = '';
  const card = el('div', {class:'card'});
  card.appendChild(el('div',{class:'dial-wrap'}, el('div',{class:'dial', id:'dial', html:dialSVG(false)})));
  card.appendChild(el('h3',{style:'font-family:var(--disp);margin:0 0 4px;text-align:center;'}, 'মাস্টার পাসওয়ার্ড সেট করুন'));
  card.appendChild(el('p',{class:'hint', style:'text-align:center;'}, 'এই পাসওয়ার্ড দিয়েই আপনার পুরো ভল্ট এনক্রিপ্ট হবে। এটি হারালে ডেটা পুনরুদ্ধার করা সম্ভব নয়, তাই সাবধানে মনে রাখুন।'));

  const pw1 = el('input',{type:'password', id:'setup-pw1', placeholder:'নতুন মাস্টার পাসওয়ার্ড'});
  const strengthBar = el('div',{class:'strength'}, el('div',{class:'strength-fill', id:'setup-strength-fill'}));
  const strengthLabel = el('div',{class:'hint', id:'setup-strength-label'});
  const pw2 = el('input',{type:'password', id:'setup-pw2', placeholder:'পাসওয়ার্ড আবার লিখুন'});
  const err = el('div',{class:'err', id:'setup-err'});
  const btn = el('button',{class:'btn-primary', id:'setup-btn'}, 'ভল্ট তৈরি করুন');

  card.appendChild(el('div',null,[
    el('label',null,'মাস্টার পাসওয়ার্ড'), pw1, strengthBar, strengthLabel,
    el('label',null,'পুনরায় লিখুন'), pw2,
  ]));
  card.appendChild(err);
  card.appendChild(btn);
  root.appendChild(card);

  pw1.addEventListener('input', ()=>{
    const s = passwordStrength(pw1.value);
    strengthBar.firstChild.style.width = s.score+'%';
    strengthBar.firstChild.style.background = s.color;
    strengthLabel.textContent = pw1.value ? 'শক্তি: '+s.label : '';
  });

  btn.addEventListener('click', async ()=>{
    const p1 = pw1.value, p2 = pw2.value;
    err.textContent = '';
    if(p1.length < 8){ err.textContent = 'পাসওয়ার্ড কমপক্ষে ৮ অক্ষরের হতে হবে।'; return; }
    if(p1 !== p2){ err.textContent = 'দুটি পাসওয়ার্ড মিলছে না।'; return; }
    btn.disabled = true; btn.textContent = 'তৈরি হচ্ছে...';
    const salt = randomB64(16);
    const key = await deriveKey(p1, salt, ITERATIONS);
    const verifier = await encryptStr(key, VERIFIER_TEXT);
    await storageSet('vaultbd-meta', JSON.stringify({salt, iterations: ITERATIONS, verifierIv: verifier.iv, verifierCipher: verifier.cipher}));
    state.key = key;
    state.entries = [];
    await saveVault();
    state.screen = 'vault';
    render();
    toast('ভল্ট তৈরি হয়েছে');
  });
}

function renderUnlock(root){
  root.innerHTML = '';
  const card = el('div', {class:'card'});
  card.appendChild(el('div',{class:'dial-wrap'}, el('div',{class:'dial', id:'dial', html:dialSVG(false)})));
  card.appendChild(el('h3',{style:'font-family:var(--disp);margin:0 0 4px;text-align:center;'}, 'ভল্ট আনলক করুন'));
  const pw = el('input',{type:'password', id:'unlock-pw', placeholder:'মাস্টার পাসওয়ার্ড'});
  const err = el('div',{class:'err', id:'unlock-err'});
  const btn = el('button',{class:'btn-primary'}, 'আনলক');
  card.appendChild(el('div',null,[el('label',null,'মাস্টার পাসওয়ার্ড'), pw]));
  card.appendChild(err);
  card.appendChild(btn);

  const resetRow = el('div',{class:'footer-link'}, 'পাসওয়ার্ড ভুলে গেছেন? সব ডেটা মুছে নতুন করে শুরু করুন');
  card.appendChild(resetRow);
  root.appendChild(card);

  async function tryUnlock(){
    const password = pw.value;
    err.textContent = '';
    if(!password) return;
    btn.disabled = true; btn.textContent = 'যাচাই হচ্ছে...';
    const metaRaw = await storageGet('vaultbd-meta');
    const meta = JSON.parse(metaRaw);
    try{
      const key = await deriveKey(password, meta.salt, meta.iterations || ITERATIONS);
      const verified = await decryptStr(key, meta.verifierIv, meta.verifierCipher);
      if(verified !== VERIFIER_TEXT) throw new Error('bad');
      state.key = key;
      const blobRaw = await storageGet('vaultbd-blob');
      if(blobRaw){
        const blob = JSON.parse(blobRaw);
        const json = await decryptStr(key, blob.iv, blob.cipher);
        state.entries = JSON.parse(json);
      } else {
        state.entries = [];
      }
      document.getElementById('dial').classList.add('unlocked');
      setTimeout(()=>{ state.screen = 'vault'; render(); resetLockTimer(); }, 450);
    }catch(e){
      err.textContent = 'ভুল মাস্টার পাসওয়ার্ড।';
      btn.disabled = false; btn.textContent = 'আনলক';
    }
  }
  btn.addEventListener('click', tryUnlock);
  pw.addEventListener('keydown', (e)=>{ if(e.key === 'Enter') tryUnlock(); });

  resetRow.addEventListener('click', ()=>{
    state.modal = {mode:'confirm-reset'};
    render(true);
  });
}

function categoryOf(entry){ return entry.category || 'সাধারণ'; }

function renderVault(root){
  root.innerHTML = '';

  const headerRow = el('div',{class:'header-row'}, [
    el('span',{style:'font-family:var(--disp);font-size:17px;'}, `আপনার ভল্ট (${state.entries.length})`),
    el('div',{style:'display:flex;gap:8px;'},[
      el('button',{class:'btn-ghost', onclick:()=>{ state.modal={mode:'change-pw'}; render(true); }}, 'পাসওয়ার্ড পরিবর্তন'),
      el('button',{class:'btn-ghost', onclick:()=> lockVault()}, 'লক করুন'),
    ])
  ]);
  root.appendChild(headerRow);

  const toolbar = el('div',{class:'toolbar'});
  const searchInput = el('input',{type:'text', placeholder:'সাইট বা ইউজারনেম খুঁজুন...', value: state.search});
  searchInput.addEventListener('input', ()=>{ state.search = searchInput.value; renderEntryList(list); });
  toolbar.appendChild(searchInput);
  toolbar.appendChild(el('button',{class:'btn-icon', title:'নতুন এন্ট্রি', onclick:()=>{ state.modal = {mode:'add', entry:{site:'',username:'',password:'',url:'',category:'সাধারণ',notes:''}}; render(true); }}, '＋'));
  root.appendChild(toolbar);

  const chips = el('div',{class:'chips'});
  CATEGORIES.forEach(cat=>{
    const chip = el('div',{class:'chip'+(state.activeCategory===cat?' active':'')}, cat);
    chip.addEventListener('click', ()=>{ state.activeCategory = cat; renderChips(chips); renderEntryList(list); });
    chips.appendChild(chip);
  });
  root.appendChild(chips);

  const list = el('div',{id:'entry-list'});
  root.appendChild(list);
  renderEntryList(list);

  const exportRow = el('div',{style:'display:flex;gap:8px;margin-top:18px;'},[
    el('button',{class:'btn-ghost', style:'flex:1;', onclick: exportBackup}, 'এনক্রিপ্টেড ব্যাকআপ কপি করুন'),
    el('button',{class:'btn-ghost', style:'flex:1;', onclick: ()=>{ state.modal={mode:'import'}; render(true); }}, 'ব্যাকআপ থেকে ইমপোর্ট'),
  ]);
  root.appendChild(exportRow);
}

function renderChips(chips){
  Array.from(chips.children).forEach((c,i)=>{
    c.className = 'chip'+(CATEGORIES[i]===state.activeCategory?' active':'');
  });
}

function renderEntryList(list){
  list.innerHTML = '';
  const q = state.search.trim().toLowerCase();
  const filtered = state.entries.filter(e=>{
    const matchesCat = state.activeCategory === 'সব' || categoryOf(e) === state.activeCategory;
    const matchesQ = !q || (e.site||'').toLowerCase().includes(q) || (e.username||'').toLowerCase().includes(q);
    return matchesCat && matchesQ;
  });
  if(filtered.length === 0){
    list.appendChild(el('div',{class:'empty'}, state.entries.length===0 ? 'এখনো কোনো এন্ট্রি নেই। ＋ চেপে প্রথম এন্ট্রি যোগ করুন।' : 'কোনো ফলাফল পাওয়া যায়নি।'));
    return;
  }
  filtered.forEach(entry=>{
    const idx = state.entries.indexOf(entry);
    const passShown = { on:false };
    const passSpan = el('span',{class:'entry-pass'}, '••••••••');
    const toggleBtn = el('button',{class:'btn-icon', style:'width:30px;height:30px;font-size:12px;'}, '👁');
    toggleBtn.addEventListener('click', ()=>{
      passShown.on = !passShown.on;
      passSpan.textContent = passShown.on ? entry.password : '••••••••';
    });
    const copyPassBtn = el('button',{class:'btn-icon', style:'width:30px;height:30px;font-size:12px;'}, '⧉');
    copyPassBtn.addEventListener('click', async ()=>{
      await navigator.clipboard.writeText(entry.password);
      toast('পাসওয়ার্ড কপি হয়েছে');
    });
    const copyUserBtn = el('button',{class:'btn-icon', style:'width:30px;height:30px;font-size:12px;'}, '@');
    copyUserBtn.addEventListener('click', async ()=>{
      await navigator.clipboard.writeText(entry.username);
      toast('ইউজারনেম কপি হয়েছে');
    });
    const editBtn = el('button',{class:'btn-icon', style:'width:30px;height:30px;font-size:12px;'}, '✎');
    editBtn.addEventListener('click', ()=>{ state.modal = {mode:'edit', entry, idx}; render(true); });
    const delBtn = el('button',{class:'btn-icon', style:'width:30px;height:30px;font-size:12px;color:var(--danger);'}, '🗑');
    delBtn.addEventListener('click', ()=>{ state.modal = {mode:'confirm-delete', idx}; render(true); });

    const card = el('div',{class:'entry'},[
      el('div',{class:'entry-top'},[
        el('div',null,[
          el('div',{class:'entry-site'}, entry.site || '(নামহীন)'),
          el('div',{class:'entry-cat'}, categoryOf(entry)),
        ]),
        el('div',{class:'entry-actions'},[editBtn, delBtn])
      ]),
      el('div',{class:'entry-user'}, entry.username || '—'),
      el('div',{class:'entry-pass-row'},[passSpan, toggleBtn, copyPassBtn, copyUserBtn])
    ]);
    list.appendChild(card);
  });
}

/* ============ Modals ============ */
function closeModal(){ state.modal = null; render(true); }

function renderModal(){
  const existing = document.getElementById('modal-backdrop');
  if(existing) existing.remove();
  if(!state.modal) return;

  const backdrop = el('div',{class:'modal-backdrop', id:'modal-backdrop'});
  backdrop.addEventListener('click', (e)=>{ if(e.target === backdrop) closeModal(); });
  const modal = el('div',{class:'modal'});
  backdrop.appendChild(modal);

  if(state.modal.mode === 'add' || state.modal.mode === 'edit'){
    renderEntryForm(modal);
  } else if(state.modal.mode === 'confirm-delete'){
    modal.appendChild(el('h3',null,'এন্ট্রি মুছবেন?'));
    modal.appendChild(el('p',{class:'hint'},'এই কাজটি পূর্বাবস্থায় ফেরানো যাবে না।'));
    const row = el('div',{style:'display:flex;gap:10px;margin-top:16px;'},[
      el('button',{class:'btn-ghost', style:'flex:1;', onclick: closeModal}, 'বাতিল'),
      el('button',{class:'btn-danger', style:'flex:1;', onclick: async ()=>{
        state.entries.splice(state.modal.idx,1);
        await saveVault();
        closeModal();
        renderVault(document.getElementById('root'));
        toast('এন্ট্রি মুছে ফেলা হয়েছে');
      }}, 'মুছুন'),
    ]);
    modal.appendChild(row);
  } else if(state.modal.mode === 'confirm-reset'){
    modal.appendChild(el('h3',null,'সব ডেটা মুছে ফেলবেন?'));
    modal.appendChild(el('p',{class:'hint'},'মাস্টার পাসওয়ার্ড ভুলে গেলে পুরনো ডেটা পুনরুদ্ধার করার কোনো উপায় নেই। এগিয়ে গেলে ভল্টের সব এন্ট্রি স্থায়ীভাবে মুছে যাবে এবং আপনি নতুন মাস্টার পাসওয়ার্ড দিয়ে শুরু করতে পারবেন।'));
    const row = el('div',{style:'display:flex;gap:10px;margin-top:16px;'},[
      el('button',{class:'btn-ghost', style:'flex:1;', onclick: closeModal}, 'বাতিল'),
      el('button',{class:'btn-danger', style:'flex:1;', onclick: async ()=>{
        await storageSet('vaultbd-meta', '');
        await storageSet('vaultbd-blob', '');
        state.modal = null;
        state.screen = 'setup';
        render();
      }}, 'সব মুছে নতুন শুরু'),
    ]);
    modal.appendChild(row);
  } else if(state.modal.mode === 'change-pw'){
    renderChangePassword(modal);
  } else if(state.modal.mode === 'import'){
    renderImport(modal);
  }

  document.body.appendChild(backdrop);
}

function renderEntryForm(modal){
  const isEdit = state.modal.mode === 'edit';
  const entry = Object.assign({site:'',username:'',password:'',url:'',category:'সাধারণ',notes:''}, state.modal.entry);
  modal.appendChild(el('h3',null, isEdit ? 'এন্ট্রি সম্পাদনা করুন' : 'নতুন এন্ট্রি'));

  const site = el('input',{type:'text', value:entry.site, placeholder:'যেমন: ফেসবুক, জিমেইল'});
  const username = el('input',{type:'text', value:entry.username, placeholder:'ইউজারনেম বা ইমেইল'});
  const passRow = el('div',{style:'position:relative;'});
  const passInput = el('input',{type:'password', class:'mono-field', value:entry.password, placeholder:'পাসওয়ার্ড'});
  passRow.appendChild(passInput);
  const strengthBar = el('div',{class:'strength'}, el('div',{class:'strength-fill'}));
  const strengthLabel = el('div',{class:'hint'});
  function updStrength(){
    const s = passwordStrength(passInput.value);
    strengthBar.firstChild.style.width = s.score+'%';
    strengthBar.firstChild.style.background = s.color;
    strengthLabel.textContent = passInput.value ? 'শক্তি: '+s.label : '';
  }
  passInput.addEventListener('input', updStrength);
  updStrength();

  const genBtn = el('button',{class:'btn-ghost', style:'margin-top:8px;'}, '🎲 পাসওয়ার্ড জেনারেট করুন');
  const genPanel = el('div',{style:'display:none;margin-top:10px;padding:12px;background:var(--surface2);border-radius:8px;border:1px solid var(--line);'});
  const lenLabel = el('div',{class:'hint'}, 'দৈর্ঘ্য: 16');
  const lenInput = el('input',{type:'range', min:'8', max:'32', value:'16', style:'width:100%;'});
  lenInput.addEventListener('input', ()=> lenLabel.textContent = 'দৈর্ঘ্য: '+lenInput.value);
  const optUpper = el('input',{type:'checkbox', checked:'checked'});
  const optLower = el('input',{type:'checkbox', checked:'checked'});
  const optNums = el('input',{type:'checkbox', checked:'checked'});
  const optSyms = el('input',{type:'checkbox', checked:'checked'});
  const genOpts = el('div',{class:'gen-opts'},[
    el('label',null,[optUpper,'বড় হাতের']),
    el('label',null,[optLower,'ছোট হাতের']),
    el('label',null,[optNums,'সংখ্যা']),
    el('label',null,[optSyms,'চিহ্ন']),
  ]);
  const genApply = el('button',{class:'btn-primary', style:'margin-top:10px;'}, 'ব্যবহার করুন');
  genApply.addEventListener('click', ()=>{
    const pw = generatePassword({length:parseInt(lenInput.value), upper:optUpper.checked, lower:optLower.checked, nums:optNums.checked, syms:optSyms.checked});
    passInput.type = 'text';
    passInput.value = pw;
    updStrength();
  });
  genPanel.appendChild(lenLabel);
  genPanel.appendChild(lenInput);
  genPanel.appendChild(genOpts);
  genPanel.appendChild(genApply);
  genBtn.addEventListener('click', ()=>{ genPanel.style.display = genPanel.style.display==='none'?'block':'none'; });

  const url = el('input',{type:'text', value:entry.url, placeholder:'ওয়েবসাইট লিঙ্ক (ঐচ্ছিক)'});
  const category = el('select', null);
  CATEGORIES.filter(c=>c!=='সব').forEach(c=>{
    const opt = el('option',{value:c}, c);
    if(c===entry.category) opt.setAttribute('selected','selected');
    category.appendChild(opt);
  });
  const notes = el('textarea',{placeholder:'নোট (ঐচ্ছিক)'}, entry.notes);

  modal.appendChild(el('label',null,'সাইট/অ্যাপের নাম')); modal.appendChild(site);
  modal.appendChild(el('label',null,'ইউজারনেম')); modal.appendChild(username);
  modal.appendChild(el('label',null,'পাসওয়ার্ড')); modal.appendChild(passRow);
  modal.appendChild(strengthBar); modal.appendChild(strengthLabel);
  modal.appendChild(genBtn); modal.appendChild(genPanel);
  modal.appendChild(el('label',null,'ওয়েবসাইট লিঙ্ক')); modal.appendChild(url);
  modal.appendChild(el('label',null,'ক্যাটাগরি')); modal.appendChild(category);
  modal.appendChild(el('label',null,'নোট')); modal.appendChild(notes);

  const err = el('div',{class:'err'});
  modal.appendChild(err);

  const row = el('div',{style:'display:flex;gap:10px;margin-top:14px;'},[
    el('button',{class:'btn-ghost', style:'flex:1;', onclick: closeModal}, 'বাতিল'),
    el('button',{class:'btn-primary', style:'flex:1;margin-top:0;', onclick: async ()=>{
      if(!site.value.trim()){ err.textContent = 'সাইটের নাম দিন।'; return; }
      if(!passInput.value){ err.textContent = 'পাসওয়ার্ড দিন।'; return; }
      const newEntry = { site:site.value.trim(), username:username.value.trim(), password:passInput.value, url:url.value.trim(), category:category.value, notes:notes.value.trim() };
      if(isEdit){ state.entries[state.modal.idx] = newEntry; }
      else { state.entries.push(newEntry); }
      await saveVault();
      closeModal();
      renderVault(document.getElementById('root'));
      toast(isEdit ? 'এন্ট্রি আপডেট হয়েছে' : 'এন্ট্রি যোগ হয়েছে');
    }}, 'সংরক্ষণ করুন'),
  ]);
  modal.appendChild(row);
}

function renderChangePassword(modal){
  modal.appendChild(el('h3',null,'মাস্টার পাসওয়ার্ড পরিবর্তন'));
  modal.appendChild(el('p',{class:'hint'},'নতুন পাসওয়ার্ড দিয়ে পুরো ভল্ট পুনরায় এনক্রিপ্ট করা হবে।'));
  const oldPw = el('input',{type:'password', placeholder:'বর্তমান পাসওয়ার্ড'});
  const newPw = el('input',{type:'password', placeholder:'নতুন পাসওয়ার্ড'});
  const newPw2 = el('input',{type:'password', placeholder:'নতুন পাসওয়ার্ড আবার লিখুন'});
  const err = el('div',{class:'err'});
  modal.appendChild(el('label',null,'বর্তমান পাসওয়ার্ড')); modal.appendChild(oldPw);
  modal.appendChild(el('label',null,'নতুন পাসওয়ার্ড')); modal.appendChild(newPw);
  modal.appendChild(el('label',null,'নিশ্চিত করুন')); modal.appendChild(newPw2);
  modal.appendChild(err);
  const row = el('div',{style:'display:flex;gap:10px;margin-top:14px;'},[
    el('button',{class:'btn-ghost', style:'flex:1;', onclick: closeModal}, 'বাতিল'),
    el('button',{class:'btn-primary', style:'flex:1;margin-top:0;', onclick: async ()=>{
      err.textContent = '';
      const metaRaw = await storageGet('vaultbd-meta');
      const meta = JSON.parse(metaRaw);
      try{
        const oldKey = await deriveKey(oldPw.value, meta.salt, meta.iterations || ITERATIONS);
        const verified = await decryptStr(oldKey, meta.verifierIv, meta.verifierCipher);
        if(verified !== VERIFIER_TEXT) throw new Error('bad');
      }catch(e){ err.textContent = 'বর্তমান পাসওয়ার্ড ভুল।'; return; }
      if(newPw.value.length < 8){ err.textContent = 'নতুন পাসওয়ার্ড কমপক্ষে ৮ অক্ষরের হতে হবে।'; return; }
      if(newPw.value !== newPw2.value){ err.textContent = 'নতুন পাসওয়ার্ড দুটি মিলছে না।'; return; }
      const newSalt = randomB64(16);
      const newKey = await deriveKey(newPw.value, newSalt, ITERATIONS);
      const verifier = await encryptStr(newKey, VERIFIER_TEXT);
      await storageSet('vaultbd-meta', JSON.stringify({salt:newSalt, iterations:ITERATIONS, verifierIv:verifier.iv, verifierCipher:verifier.cipher}));
      state.key = newKey;
      await saveVault();
      closeModal();
      toast('মাস্টার পাসওয়ার্ড পরিবর্তন হয়েছে');
    }}, 'পরিবর্তন করুন'),
  ]);
  modal.appendChild(row);
}

function exportBackup(){
  (async ()=>{
    const meta = await storageGet('vaultbd-meta');
    const blob = await storageGet('vaultbd-blob');
    const backup = JSON.stringify({meta:JSON.parse(meta), blob:JSON.parse(blob), exportedAt:new Date().toISOString()});
    const encoded = btoa(unescape(encodeURIComponent(backup)));
    try{
      await navigator.clipboard.writeText(encoded);
      toast('এনক্রিপ্টেড ব্যাকআপ ক্লিপবোর্ডে কপি হয়েছে');
    }catch(e){
      toast('কপি করা যায়নি — ম্যানুয়ালি কপি করুন');
    }
  })();
}

function renderImport(modal){
  modal.appendChild(el('h3',null,'ব্যাকআপ থেকে ইমপোর্ট'));
  modal.appendChild(el('p',{class:'hint'},'এটি বর্তমান ভল্টের সব ডেটা প্রতিস্থাপন করবে। ব্যাকআপ টেক্সট নিচে পেস্ট করুন।'));
  const ta = el('textarea',{placeholder:'এনক্রিপ্টেড ব্যাকআপ টেক্সট এখানে পেস্ট করুন', style:'min-height:100px;'});
  const err = el('div',{class:'err'});
  modal.appendChild(ta);
  modal.appendChild(err);
  const row = el('div',{style:'display:flex;gap:10px;margin-top:14px;'},[
    el('button',{class:'btn-ghost', style:'flex:1;', onclick: closeModal}, 'বাতিল'),
    el('button',{class:'btn-primary', style:'flex:1;margin-top:0;', onclick: async ()=>{
      try{
        const decoded = decodeURIComponent(escape(atob(ta.value.trim())));
        const parsed = JSON.parse(decoded);
        if(!parsed.meta || !parsed.blob) throw new Error('invalid');
        await storageSet('vaultbd-meta', JSON.stringify(parsed.meta));
        await storageSet('vaultbd-blob', JSON.stringify(parsed.blob));
        closeModal();
        toast('ইমপোর্ট সম্পন্ন — এখন আনলক করুন');
        lockVault();
      }catch(e){
        err.textContent = 'ব্যাকআপ টেক্সট সঠিক নয়।';
      }
    }}, 'ইমপোর্ট করুন'),
  ]);
  modal.appendChild(row);
}

/* ============ Master render ============ */
function render(modalOnly){
  const root = document.getElementById('root');
  if(!modalOnly){
    if(state.screen === 'setup') renderSetup(root);
    else if(state.screen === 'unlock') renderUnlock(root);
    else if(state.screen === 'vault') renderVault(root);
    else root.innerHTML = '<div class="card" style="text-align:center;color:var(--text-dim);">লোড হচ্ছে...</div>';
  }
  renderModal();
}

init();
</script>
</body>
</html>
